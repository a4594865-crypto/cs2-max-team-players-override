name: Build and Release CS2 Plugin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x 
          dotnet-quality: 'preview' 

      - name: Restore dependencies
        run: dotnet restore

      # 4. 執行發佈
      - name: Publish Plugin
        run: dotnet publish --configuration Release --no-restore -o ./publish
      - name: Cleanup Non-essential files
        run: |
          find ./publish -type f -name "*.pdb" -delete
          find ./publish -type f -name "*.xml" -delete
          find ./publish -type f -name "*.dll" ! -name "MaxTeamPlayersOverride.dll" -delete
          find ./publish -type f -name "*.json" ! -name "MaxTeamPlayersOverride.deps.json" -delete

      # 6. 上傳結果
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MaxTeamPlayersOverride-v${{ github.run_number }}
          path: ./publish/

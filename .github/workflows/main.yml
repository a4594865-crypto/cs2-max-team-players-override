name: Build and Release CS2 Plugin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x # 🎯 升級至 .NET 10
          dotnet-quality: 'preview' # 🎯 開啟預覽版通道

      - name: Restore dependencies
        run: dotnet restore

      # 4. 執行發佈
      - name: Publish Plugin
        run: dotnet publish --configuration Release --no-restore -o ./publish

      # 5. 【關鍵修改】精確清理：保留主程式 .dll 與必要的 .deps.json 檔案
      # 刪除所有 pdb (偵錯檔) 和 xml (說明檔)
      # 刪除除了主程式以外的所有 dll，但留著相依性設定檔，因為 .NET 10 伺服器必須讀取它
      - name: Cleanup Non-essential files
        run: |
          find ./publish -type f -name "*.pdb" -delete
          find ./publish -type f -name "*.xml" -delete
          find ./publish -type f -name "*.dll" ! -name "MaxTeamPlayersOverride.dll" -delete
          # 🎯 刪除除了主程式之外的其他 json 檔（如果有），但精確保留 MaxTeamPlayersOverride.deps.json
          find ./publish -type f -name "*.json" ! -name "MaxTeamPlayersOverride.deps.json" -delete

      # 6. 上傳結果
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MaxTeamPlayersOverride-v${{ github.run_number }}
          path: ./publish/
